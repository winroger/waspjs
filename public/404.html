<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WaspJS</title>
    <script>
      // GitHub Pages SPA fallback.
      // Keep the first path segment (repo name: /waspjs) and redirect the rest via query.
      var pathSegmentsToKeep = 1;
      var locationRef = window.location;
      var newUrl =
        locationRef.protocol +
        '//' +
        locationRef.hostname +
        (locationRef.port ? ':' + locationRef.port : '') +
        locationRef.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        locationRef.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationRef.search ? '&' + locationRef.search.slice(1).replace(/&/g, '~and~') : '') +
        locationRef.hash;

      locationRef.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
